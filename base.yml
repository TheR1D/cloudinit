#cloud-config

merge_how:
 - name: list
   settings: [append]
 - name: dict
   settings: [no_replace, recurse_list]

package_update: true
package_upgrade: true

# Swap configuration (2GB)
swap:
  filename: /swapfile
  size: 2147483648
  maxsize: 2147483648

# Hostname and timezone
hostname: ${hostname}
timezone: ${timezone}

# SSH hardening
ssh_pwauth: false
disable_root: true

# User configuration
users:
  - name: ${username}
    ssh_authorized_keys: ${ssh_public_key}
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    groups: [sudo]
    shell: /usr/bin/zsh
    lock_passwd: true

# Package installation, most of these are preinstalled on Ubuntu
packages:
  - openssh-server
  - qemu-guest-agent
  - ufw
  - git
  - zsh
  - tmux
  - htop
  - curl
  - wget
  - neovim
  - python3
  - python3-pip
  - pipx
  - build-essential

write_files:
  # Overwrite default SSH port
  - path: /etc/ssh/sshd_config.d/01-custom-port.conf
    content: |
      Port ${ssh_port}
    permissions: '0600'

  # Git config to use credential store
  - path: /etc/gitconfig
    permissions: '0644'
    content: |
      [credential]
          helper = store --file /etc/git-credentials

  # Set 1Password environment variables
  - path: /etc/environment
    owner: ${username}:${username}
    permissions: '0600'
    append: true
    defer: true
    content: |
      OP_SERVICE_ACCOUNT_TOKEN="${op_service_account_token}"
      OP_ENV_ID="${op_env_id}"

  # Git credential store for GitHub private repos
  - path: /etc/git-credentials
    owner: ${username}:${username}
    permissions: '0600'
    defer: true
    content: |
      ${github_credentials}

  # Prevent ZSH new-user wizard (zsh-newuser-install) for new users
  - path: /etc/skel/.zshrc
    permissions: '0644'
    content: ""

  - path: /etc/zsh/zshrc
    permissions: '0644'
    content: |
      # History settings
      HISTFILE=~/.zsh_history
      HISTSIZE=1000
      SAVEHIST=10000
      setopt APPEND_HISTORY

      # Enable VIM mode
      bindkey -v

      # Unbind CTRL+L (later will be used for sgpt completion)
      bindkey -r '^L'

      # Fix not working backspace in VIM insert mode
      bindkey -M viins '^?' backward-delete-char
      bindkey -M viins '^H' backward-delete-char

      # Keep default CTRL+R working
      bindkey -M vicmd '^R' history-incremental-search-backward
      bindkey -M viins '^R' history-incremental-search-backward

      # CTRL+T to attach or create tmux session
      bindkey -s '^T' 'tmux attach || tmux new\n'

      # Custom prompt
      PROMPT="$(hostname): "

      # Enable completions
      autoload -Uz compinit
      compinit

# Run commands after initial setup
runcmd:
  # Install 1Password CLI Beta (with Environment feature)
  - curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /usr/share/keyrings/1password-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) beta main" | tee /etc/apt/sources.list.d/1password.list
  - mkdir -p /etc/debsig/policies/AC2D62742012EA22/
  - curl -sS https://downloads.1password.com/linux/debian/debsig/1password.pol | tee /etc/debsig/policies/AC2D62742012EA22/1password.pol
  - mkdir -p /usr/share/debsig/keyrings/AC2D62742012EA22
  - curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  - apt update && apt install -y 1password-cli

  # Install Teleport CLI and join the Teleport cluster, uncomment to if needed
  # - curl -sS https://goteleport.com/static/install.sh | bash -s 18.8.3
  # - teleport node configure --proxy=${teleport_domain}:443 --token=${teleport_join_token} --join-method=token --output=file
  # - systemctl enable --now teleport

  - systemctl enable --now qemu-guest-agent
  - systemctl restart ssh
  - ufw allow ${ssh_port}/tcp comment 'SSH'
  - ufw --force enable
  # After installation complete drop caches to free up memory
  - sysctl -w vm.drop_caches=3
